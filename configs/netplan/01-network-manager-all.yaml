# /etc/netplan/01-network-manager-all.yaml
#
# Static IP configuration for the home server.
# Replace the addresses, gateway, and DNS values with your own.
#
# Apply changes with:
#   sudo netplan apply

network:
  version: 2
  renderer: NetworkManager
  ethernets:
    enp3s0:
      dhcp4: no
      addresses: [192.168.1.80/24]
      routes:
       - to: default
         via: 192.168.1.254
      nameservers:
          addresses: [8.8.8.8, 8.8.4.4]